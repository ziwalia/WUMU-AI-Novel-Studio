<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <!-- Book icon -->
  <g transform="translate(60, 55)">
    <rect x="10" y="10" width="40" height="60" rx="3" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <rect x="50" y="10" width="40" height="60" rx="3" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <line x1="50" y1="10" x2="50" y2="70" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="30" cy="30" r="4" fill="#667eea"/>
    <circle cx="70" cy="30" r="4" fill="#764ba2"/>
    <line x1="25" y1="42" x2="45" y2="42" stroke="#667eea" stroke-width="1.5" opacity="0.6"/>
    <line x1="25" y1="50" x2="40" y2="50" stroke="#667eea" stroke-width="1.5" opacity="0.4"/>
    <line x1="55" y1="42" x2="75" y2="42" stroke="#764ba2" stroke-width="1.5" opacity="0.6"/>
    <line x1="55" y1="50" x2="70" y2="50" stroke="#764ba2" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Title -->
  <text x="160" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#ffffff">乌木智书</text>
  <text x="160" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0aec0" letter-spacing="2">WUMU AI Novel Studio</text>
  <!-- Tagline -->
  <text x="160" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#667eea">AI 驱动的智能小说创作工作室</text>
  <!-- Decorative dots -->
  <circle cx="720" cy="40" r="3" fill="#667eea" opacity="0.3"/>
  <circle cx="740" cy="55" r="2" fill="#764ba2" opacity="0.3"/>
  <circle cx="750" cy="35" r="4" fill="#667eea" opacity="0.2"/>
  <circle cx="700" cy="160" r="3" fill="#764ba2" opacity="0.3"/>
  <circle cx="730" cy="170" r="2" fill="#667eea" opacity="0.2"/>
  <circle cx="680" cy="175" r="5" fill="#764ba2" opacity="0.15"/>
</svg>
